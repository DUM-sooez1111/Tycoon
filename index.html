<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>타이쿤 파크</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-screen">
      <header class="resource-bar">
        <div class="resources">
          <div class="resource"><span class="resource-icon coin">●</span><strong id="gold">20,000</strong></div>
          <div class="resource"><span class="resource-icon happy">●</span><strong id="happiness">50%</strong></div>
          <div class="resource"><span class="resource-icon people">♟</span><strong id="population">0</strong></div>
        </div>
        <div class="date-card"><span>▣</span><strong>1년 1월 1주</strong></div>
        <div class="time-controls" aria-label="시간 조절">
          <button type="button" class="time-button" aria-label="일시정지">Ⅱ</button>
          <button type="button" class="time-button" aria-label="재생">▶</button>
          <button type="button" class="time-button" aria-label="빠르게">▶▶</button>
          <button type="button" class="time-button" aria-label="설정">⚙</button>
        </div>
      </header>

      <section class="play-area">
        <nav class="left-menu" aria-label="주요 메뉴">
          <button type="button" class="side-button active"><span>▥</span>통계</button>
          <button type="button" class="side-button"><span>▤</span>연구</button>
          <button type="button" class="side-button"><span>⚑</span>마케팅</button>
          <button type="button" class="side-button"><span>♟</span>직원</button>
          <button type="button" class="side-button"><span>▣</span>상점</button>
          <button type="button" class="side-button"><span>★</span>업적</button>
        </nav>

        <section class="park" aria-label="타이쿤 파크 지도">
          <div class="river"></div><div class="river-bank bank-top"></div><div class="river-bank bank-bottom"></div>
          <div class="bridge"><span>▦</span></div>
          <div class="fence top-fence"></div><div class="fence bottom-fence"></div>
          <div class="path path-a"></div><div class="path path-b"></div><div class="path path-c"></div><div class="path path-d"></div><div class="path path-e"></div><div class="path path-f"></div>
          <div class="plaza"><span>✦</span><small>중앙 광장</small></div>
          <div class="entrance"><b>타이쿤 파크</b><span>입구</span></div>
          <div class="map-note">첫 건물을 지을 빈 부지를 선택하세요</div>
          <div class="flower-patch flowers-one">✿ ✿</div><div class="flower-patch flowers-two">✿ ✿ ✿</div><div class="flower-patch flowers-three">✿ ✿</div>
          <div class="trees trees-one">♣ ♣ ♣</div><div class="trees trees-two">♣ ♣</div><div class="trees trees-three">♣ ♣ ♣</div><div class="trees trees-four">♣ ♣</div>

          <button type="button" class="empty-lot lot-one" data-lot="1">＋<span>시작 부지</span></button>
          <button type="button" class="locked-lot lot-two" data-lot="2" data-cost="1200">🔒<span>₩ 1,200</span></button>
          <button type="button" class="locked-lot lot-three" data-lot="3" data-cost="1800">🔒<span>₩ 1,800</span></button>
          <button type="button" class="locked-lot lot-four" data-lot="4" data-cost="2500">🔒<span>₩ 2,500</span></button>
          <button type="button" class="locked-lot lot-five" data-lot="5" data-cost="3200">🔒<span>₩ 3,200</span></button>
          <button type="button" class="locked-lot lot-six" data-lot="6" data-cost="4000">🔒<span>₩ 4,000</span></button>
          <button type="button" class="locked-lot lot-seven" data-lot="7" data-cost="5000">🔒<span>₩ 5,000</span></button>
          <button type="button" class="locked-lot lot-eight" data-lot="8" data-cost="6500">🔒<span>₩ 6,500</span></button>
          <button type="button" class="locked-lot lot-nine" data-lot="9" data-cost="8000">🔒<span>₩ 8,000</span></button>
        </section>

        <aside class="info-panel">
          <p class="panel-kicker">새로운 시작</p>
          <h1 id="selected-name">새 파크</h1>
          <div class="stars" id="selected-stars">☆☆☆☆☆</div>
          <div class="land-counter">개발 구역 <strong id="unlocked-count">1</strong> / 9</div>
          <div class="info-row"><span>수익</span><strong id="selected-income">+0/분</strong></div>
          <div class="info-row"><span>레벨</span><strong id="selected-level">Lv.1</strong></div>
          <p id="selected-description">하단에서 건물을 고른 뒤 빈 부지를 눌러 첫 상점을 지어보세요.</p>
          <button id="upgrade-button" type="button" class="upgrade" disabled>건물을 선택하세요</button>
        </aside>
      </section>

      <footer class="build-menu">
        <button type="button" class="build-button" data-kind="road"><span>♣</span>길</button>
        <button type="button" class="build-button" data-kind="facility"><span>▥</span>편의시설</button>
        <button type="button" class="build-button active" data-kind="shop"><span>🏪</span>상점</button>
        <button type="button" class="build-button" data-kind="ride"><span>🎠</span>놀이기구</button>
        <button type="button" class="build-button" data-kind="decor"><span>⛲</span>장식</button>
        <button type="button" class="build-button" data-kind="other"><span>•••</span>기타</button>
        <section class="goal"><b>목표</b><span>★ 손님 수 1,000명 달성</span><div><i></i><em id="goal-count">0 / 1000</em></div></section>
      </footer>
    </main>
    <script src="game.js"></script>
  </body>
</html>
